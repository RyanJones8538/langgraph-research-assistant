server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://backend:2024/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Required for SSE: Nginx buffers responses by default, which means it
    # collects the entire stream before forwarding — defeating the purpose.
    # These two lines make it pass each chunk through immediately.
    proxy_buffering off;
    proxy_cache off;

    # Research + writing can take several minutes. The default read timeout is
    # 60 s, which would drop the connection mid-stream. 10 min is generous.
    proxy_read_timeout 600s;
  }
}