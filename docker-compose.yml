version: "3.9"

services:
  db:
    image: postgres:16
    container_name: research-db
    environment:
      POSTGRES_DB: researchdb
      POSTGRES_USER: researchuser
      POSTGRES_PASSWORD: researchpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-backend
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "2024:2024"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: research-ui
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata: