version: "3.9"

services:
  db:
    image: postgres:16
    container_name: research-db
    environment:
      POSTGRES_DB: researchdb
      POSTGRES_USER: researchuser
      POSTGRES_PASSWORD: researchpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchuser -d researchdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: researchdb
      DB_USER: researchuser
      DB_PASSWORD: researchpassword
      DATABASE_URL: postgresql://researchuser:researchpassword@db:5432/researchdb
    ports:
      - "2024:2024"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: research-ui
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata: